name: QA

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches: ["main"]

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24" # Cached by github (https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2204-Readme.md#nodejs)
          cache: "pnpm"
          cache-dependency-path: ./pnpm-lock.yaml

      - uses: actions/cache@v3
        id: cache-dependencies
        with:
          path: |
            ~/.pnpm-store
            ./node_modules
          key: pnpm-${{ hashFiles('./pnpm-lock.yaml') }}

      - name: Install dependencies
        if: ${{ steps.cache-dependencies.outputs.cache-hit != 'true' }}
        run: pnpm install

  biome:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            ./node_modules
          key: pnpm-${{ hashFiles('./pnpm-lock.yaml') }}

      - name: Run biome
        run: |
          yarn biome:check

  tsc:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            ./node_modules
          key: pnpm-${{ hashFiles('./pnpm-lock.yaml') }}

      - name: Run tsc
        run: |
          yarn tsc
